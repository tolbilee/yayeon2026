<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Filial Exam</title>
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-stroke: rgba(255, 255, 255, 0.35);
      --txt-main: #f8fafc;
      --txt-sub: #dbeafe;
      --bg-main: url('./assets/quiz2026/yyq_en_bg_main.jpg');
      --bg-quiz: url('./assets/quiz2026/yyq_en_bg_quiz.jpg');
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,0), transparent 58%),
        radial-gradient(900px 500px at 100% 0%, rgba(56,189,248,0), transparent 62%),
        linear-gradient(135deg, rgba(29,78,216,0) 0%, rgba(109,40,217,0) 55%, rgba(15,23,42,0) 100%),
        var(--bg-main);
      background-size: cover, cover, cover, cover;
      background-position: top center, top center, top center, top center;
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--txt-main);
      overflow-x: hidden;
      transition: background 0.45s ease;
    }
    body.quiz-mode {
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,0), transparent 58%),
        radial-gradient(900px 500px at 100% 0%, rgba(56,189,248,0), transparent 62%),
        linear-gradient(135deg, rgba(29,78,216,0) 0%, rgba(109,40,217,0) 55%, rgba(15,23,42,0) 100%),
        var(--bg-quiz);
      background-size: cover, cover, cover, cover;
      background-position: top center, top center, top center, top center;
      background-attachment: fixed;
    }
    .screen { display: none; min-height: 100vh; padding: 20px; justify-content: center; align-items: center; flex-direction: column; }
    .screen.show { display: flex; }
    .card {
      width: min(720px, 100%);
      background: var(--glass-bg);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(10px) saturate(125%);
      -webkit-backdrop-filter: blur(10px) saturate(125%);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,0.14), rgba(255,255,255,0.02) 35%, rgba(255,255,255,0.01) 65%);
      border-radius: inherit;
    }
    h1 { margin: 0 0 10px; }
    .muted { color: var(--txt-sub); }
    .btn { align-items: center; background-image: linear-gradient(144deg, #af40ff, #5b42f3 50%, #00ddeb); border: 0; border-radius: 10px; box-shadow: rgba(151, 65, 252, 0.32) 0 15px 30px -5px; box-sizing: border-box; color: #fff; display: inline-flex; font-size: 16px; font-weight: 700; justify-content: center; line-height: 1em; min-width: 140px; padding: 3px; user-select: none; -webkit-user-select: none; touch-action: manipulation; white-space: nowrap; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
    .btn::before { content: ""; position: absolute; inset: 3px; border-radius: 7px; background: #5a34c1; transition: 300ms; z-index: 0; }
    .btn::after { content: ""; position: absolute; top: 0; left: -120%; width: 80%; height: 100%; background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent); animation: sweep 2.4s linear infinite; z-index: 1; }
    .btn > * { position: relative; z-index: 2; }
    .btn .text {
      background-color: #5a34c1;
      padding: 12px 16px;
      border-radius: 7px;
      width: 100%;
      height: 100%;
      transition: 300ms;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .hero-actions .btn .text { padding: 14px 18px; }
    .btn:hover::before { background: transparent; }
    .btn:hover { outline: 0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.secondary { background-image: linear-gradient(144deg, #64748b, #475569 50%, #0ea5e9); }
    .btn:active { transform: scale(0.95); }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-actions { justify-content: center; gap: 14px; margin-top: 20px; }
    .hero-actions .btn {
      min-width: 158px;
      min-height: 52px;
      font-size: 17px;
      border-radius: 16px;
    }
    .main-cta {
      width: min(520px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }
    .main-cta .btn {
      width: min(360px, 90vw);
      min-height: 64px;
      font-size: 22px;
      border-radius: 18px;
    }
    .main-cta .btn .text {
      width: 100%;
      padding: 16px 20px;
    }
    .input { width: 100%; border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 10px; margin-top: 8px; font-size: 15px; color: #fff; background: rgba(15, 23, 42, 0.35); }
    .input::placeholder { color: rgba(226,232,240,0.8); }
    .error { color: #fecaca; min-height: 18px; margin-top: 8px; font-size: 13px; }
    .question-no { color: #c4b5fd; font-weight: 700; }
    .question { margin: 8px 0 14px; font-size: 20px; font-weight: 700; }
    .opts { display: grid; gap: 8px; }
    .opt { border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 12px; cursor: pointer; background: rgba(15, 23, 42, 0.28); transition: transform .18s ease, background .18s ease, border-color .18s ease; }
    .opt:hover { transform: translateY(-1px); }
    .opt.sel { border-color: #a78bfa; background: rgba(79, 70, 229, 0.35); }
    .opt.ok { border-color: #4ade80; background: rgba(34, 197, 94, 0.22); animation: pulseOk .5s ease; }
    .opt.no { border-color: #fb7185; background: rgba(244, 63, 94, 0.22); animation: shakeNo .35s ease; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .bar { width: 100%; height: 8px; background: rgba(148, 163, 184, 0.3); border-radius: 999px; overflow: hidden; }
    .bar > div { height: 100%; width: 0%; background: linear-gradient(90deg, #818cf8, #22d3ee); }
    .list { display: grid; gap: 8px; max-height: 320px; overflow: auto; }
    .item { display: grid; grid-template-columns: 50px 1fr 80px; gap: 8px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.18); }
    .center { text-align: center; }
    .explain { margin-top: 14px; border: 1px solid rgba(255,255,255,0.3); background: rgba(15, 23, 42, 0.32); border-radius: 10px; padding: 12px; display: none; }
    .explain.show { display: block; }
    .explain-title { font-weight: 700; margin-bottom: 6px; }
    .result-flash { text-align: center; font-weight: 800; font-size: 22px; margin-bottom: 10px; padding: 8px 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.4); display: none; animation: flashIn .35s ease; }
    .result-flash.ok {
      display: block;
      color: #fffef2;
      background: linear-gradient(135deg, rgba(250, 204, 21, 0.8), rgba(202, 138, 4, 0.72));
      border-color: rgba(255, 235, 160, 0.95);
      box-shadow: 0 0 26px rgba(250, 204, 21, 0.62), inset 0 0 14px rgba(255, 245, 200, 0.45);
      text-shadow: 0 1px 10px rgba(120, 53, 15, 0.45);
      animation: flashIn .35s ease, goldPulse 1s ease-in-out infinite;
    }
    .result-flash.no {
      display: block;
      color: #ffe4e6;
      background: rgba(244,63,94,0.28);
      border-color: rgba(251, 113, 133, 0.7);
      box-shadow: 0 0 14px rgba(244, 63, 94, 0.35);
    }
    .burst-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .burst { position: absolute; width: 8px; height: 8px; border-radius: 999px; opacity: 0; animation: burst .8s ease forwards; }
    .confetti { position: absolute; width: 10px; height: 14px; border-radius: 2px; opacity: 0; animation: confettiDrop 1.4s linear forwards; }
    .flash-correct::before,
    .flash-wrong::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      animation: flashLayer .45s ease;
    }
    .flash-correct::before { background: radial-gradient(circle at center, rgba(34,197,94,0.25), transparent 58%); }
    .flash-wrong::before { background: radial-gradient(circle at center, rgba(244,63,94,0.22), transparent 58%); }
    .flash-wrong { animation: screenShake .36s ease; }
    .shake-card { animation: cardShake .35s ease; }
    @keyframes pulseOk {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    @keyframes shakeNo {
      0%,100% { transform: translateX(0); }
      30% { transform: translateX(-4px); }
      60% { transform: translateX(4px); }
    }
    @keyframes flashIn {
      from { transform: translateY(6px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes burst {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(0.3); opacity: 0; }
    }
    @keyframes sweep {
      0% { left: -120%; }
      100% { left: 140%; }
    }
    @keyframes flashLayer {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @keyframes cardShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }
    @keyframes confettiDrop {
      0% { transform: translateY(-30px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(80vh) rotate(420deg); opacity: 0; }
    }
    @keyframes screenShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(7px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }
    @keyframes goldPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15); }
    }
  </style>
</head>
<body>
  <section id="mainScreen" class="screen show">
    <div class="main-cta">
      <button id="startQuizBtn" class="btn" type="button"><span class="text">Begin the Exam</span></button>
      <button id="scoreboardBtn" class="btn secondary" type="button"><span class="text">Hall of Filial Piety</span></button>
    </div>
  </section>

  <section id="nicknameScreen" class="screen">
    <div id="quizCard" class="card">
      <h1>Enter Nickname</h1>
      <p class="muted">Duplicate nicknames are not allowed.</p>
      <input id="nicknameInput" class="input" maxlength="15" placeholder="Enter your nickname" />
      <div id="nicknameError" class="error"></div>
      <div class="btn-row">
        <button id="nicknameStartBtn" class="btn" type="button"><span class="text">Start</span></button>
        <button id="nicknameBackBtn" class="btn secondary" type="button"><span class="text">Back</span></button>
      </div>
    </div>
  </section>

  <section id="scoreboardScreen" class="screen">
    <div class="card">
      <h1>Hall of Filial Piety</h1>
      <div id="scoreboardList" class="list"></div>
      <div class="btn-row">
        <button id="scoreboardBackBtn" class="btn secondary" type="button"><span class="text">Back to Main</span></button>
      </div>
    </div>
  </section>

  <section id="quizScreen" class="screen">
    <div class="card">
      <div id="resultFlash" class="result-flash"></div>
      <div class="topbar">
        <div id="questionNo" class="question-no"></div>
        <div>Score: <b id="scoreNow">0</b> / <span id="totalNow">0</span></div>
      </div>
      <div class="bar"><div id="progressBar"></div></div>
      <div id="questionBlock">
        <div id="questionText" class="question"></div>
        <img id="questionImage" style="max-width:100%; border-radius:10px; display:none; margin-bottom:10px;" alt="question" />
        <div id="options" class="opts"></div>
      </div>
      <div id="explainBox" class="explain">
        <div id="explainTitle" class="explain-title"></div>
        <div id="explainText"></div>
        <img id="explainImage" style="max-width:100%; border-radius:10px; display:none; margin-top:8px;" alt="explanation" />
      </div>
      <div class="btn-row">
        <button id="nextBtn" class="btn" type="button" disabled><span class="text">CHECK ANSWER</span></button>
      </div>
    </div>
  </section>
  <div id="burstWrap" class="burst-wrap"></div>

  <section id="resultScreen" class="screen">
    <div class="card center">
      <h1 id="resultTitle"></h1>
      <p id="resultScore"></p>
      <p id="resultRank"></p>
      <p id="resultMsg" class="muted"></p>
      <div class="btn-row" style="justify-content:center;">
        <button id="resultBoardBtn" class="btn secondary" type="button"><span class="text">Hall of Filial Piety</span></button>
        <button id="resultMainBtn" class="btn" type="button"><span class="text">Back to Main</span></button>
      </div>
    </div>
  </section>

  <script>
    const QUIZ_TYPE = 'en';
    const SUPABASE_URL = window.SUPABASE_URL || 'https://nzkzuxtehiiqiwyhdcqm.supabase.co';
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56a3p1eHRlaGlpcWl3eWhkY3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NzM5NTksImV4cCI6MjA5MzI0OTk1OX0.QLxS4H664wxBB4VaZEGbPcOtnT7CKx0FqQ-FanEk0AI';

    const db = window.supabase?.createClient?.(SUPABASE_URL, SUPABASE_ANON_KEY);

    let userNickname = '';
    let currentUserId = '';
    let questions = [];
    let qIndex = 0;
    let score = 0;
    let selected = -1;
    let answered = false;

    const $ = (id) => document.getElementById(id);
    const screens = ['mainScreen', 'nicknameScreen', 'scoreboardScreen', 'quizScreen', 'resultScreen'];
    const QUIZ_COUNT = 5;

    function show(screenId) {
      screens.forEach((s) => $(s).classList.remove('show'));
      $(screenId).classList.add('show');
      document.body.classList.toggle('quiz-mode', screenId === 'quizScreen');
    }
    function showBurst(isCorrect) {
      const wrap = $('burstWrap');
      const color = isCorrect ? '#4ade80' : '#fb7185';
      for (let i = 0; i < (isCorrect ? 46 : 12); i += 1) {
        const p = document.createElement('span');
        p.className = 'burst';
        p.style.background = color;
        p.style.left = `${50 + (Math.random() * 20 - 10)}%`;
        p.style.top = `${42 + (Math.random() * 14 - 7)}%`;
        p.style.setProperty('--x', `${Math.random() * 220 - 110}px`);
        p.style.setProperty('--y', `${Math.random() * 180 - 90}px`);
        wrap.appendChild(p);
        setTimeout(() => p.remove(), 850);
      }
    }
    function flashTone(isCorrect) {
      const cls = isCorrect ? 'flash-correct' : 'flash-wrong';
      document.body.classList.remove('flash-correct', 'flash-wrong');
      void document.body.offsetWidth;
      document.body.classList.add(cls);
      setTimeout(() => document.body.classList.remove(cls), 500);
    }
    function celebrateResult() {
      const wrap = $('burstWrap');
      const colors = ['#f59e0b', '#22d3ee', '#a78bfa', '#34d399', '#fb7185'];
      for (let i = 0; i < 56; i += 1) {
        const c = document.createElement('span');
        c.className = 'confetti';
        c.style.left = `${Math.random() * 100}%`;
        c.style.top = `${-10 - Math.random() * 35}px`;
        c.style.background = colors[i % colors.length];
        c.style.animationDelay = `${Math.random() * 0.45}s`;
        wrap.appendChild(c);
        setTimeout(() => c.remove(), 1700);
      }
    }

    function pickRandomQuestions(pool, count) {
      const cloned = [...pool];
      for (let i = cloned.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned.slice(0, Math.min(count, cloned.length));
    }

    async function checkNicknameAndStart() {
      const nickname = $('nicknameInput').value.trim();
      $('nicknameError').textContent = '';
      if (!nickname) { $('nicknameError').textContent = 'Please enter your nickname'; return; }
      if (nickname.length < 2) { $('nicknameError').textContent = 'Nickname must be at least 2 characters'; return; }
      if (nickname.length > 15) { $('nicknameError').textContent = 'Nickname must be 15 characters or fewer'; return; }
      if (!db) { $('nicknameError').textContent = 'Supabase configuration is invalid.'; return; }

      const { data: dupe, error: dupeErr } = await db.from('quiz_users').select('id').eq('quiz_type', QUIZ_TYPE).eq('nickname', nickname).limit(1);
      if (dupeErr) { $('nicknameError').textContent = `Error: ${dupeErr.message}`; return; }
      if (dupe && dupe.length > 0) { $('nicknameError').textContent = 'This nickname is already in use.'; return; }

      userNickname = nickname;
      currentUserId = crypto?.randomUUID ? crypto.randomUUID() : String(Date.now());
      await startQuizGame();
    }

    async function startQuizGame() {
      const { data, error } = await db
        .from('quiz_questions')
        .select('id, quiz_type, display_order, question, image, options, correct, explanation, explanation_image')
        .eq('quiz_type', QUIZ_TYPE)
        .order('display_order', { ascending: true });

      if (error) { alert(`Failed to load questions: ${error.message}`); return; }
      if (!data || data.length === 0) { alert('No questions registered for English quiz.'); return; }

      questions = pickRandomQuestions(data, QUIZ_COUNT);
      qIndex = 0;
      score = 0;
      selected = -1;
      answered = false;
      $('scoreNow').textContent = '0';
      $('totalNow').textContent = String(questions.length);
      show('quizScreen');
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[qIndex];
      answered = false;
      $('questionNo').textContent = `Question ${qIndex + 1} / ${questions.length}`;
      $('questionText').textContent = q.question;
      const img = $('questionImage');
      if (q.image) { img.src = q.image; img.style.display = 'block'; } else { img.style.display = 'none'; }
      $('progressBar').style.width = `${(qIndex / questions.length) * 100}%`;
      const opts = $('options');
      opts.innerHTML = '';
      (q.options || []).forEach((o, idx) => {
        const d = document.createElement('div');
        d.className = 'opt';
        d.innerHTML = `<div>${o?.text ?? ''}</div>${o?.image ? `<img src="${o.image}" style="max-width:120px; margin-top:6px; border-radius:6px;" />` : ''}`;
        d.onclick = () => {
          if (answered) return;
          selected = idx;
          [...opts.children].forEach((x) => x.classList.remove('sel'));
          d.classList.add('sel');
          $('nextBtn').disabled = false;
        };
        opts.appendChild(d);
      });
      $('explainBox').classList.remove('show');
      $('questionBlock').style.display = 'block';
      $('resultFlash').className = 'result-flash';
      $('resultFlash').textContent = '';
      $('explainTitle').textContent = '';
      $('explainText').textContent = '';
      $('explainImage').style.display = 'none';
      $('nextBtn').querySelector('.text').textContent = 'CHECK ANSWER';
      $('nextBtn').disabled = true;
    }

    function moveNextQuestion() {
      qIndex += 1;
      selected = -1;
      if (qIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    async function nextStep() {
      const q = questions[qIndex];
      if (!answered && selected < 0) return;

      if (answered) {
        moveNextQuestion();
        return;
      }

      const optionEls = [...$('options').children];
      optionEls.forEach((el, idx) => {
        if (idx === q.correct) el.classList.add('ok');
        if (idx === selected && idx !== q.correct) el.classList.add('no');
      });

      if (selected === q.correct) {
        score += 1;
        $('scoreNow').textContent = String(score);
      }

      answered = true;
      $('questionBlock').style.display = 'none';
      const isCorrect = selected === q.correct;
      $('explainTitle').textContent = isCorrect ? 'Correct' : 'Incorrect';
      $('resultFlash').className = `result-flash ${isCorrect ? 'ok' : 'no'}`;
      $('resultFlash').textContent = isCorrect ? 'Correct! Great job!' : 'Not this time!';
      showBurst(isCorrect);
      flashTone(isCorrect);
      if (!isCorrect) {
        $('quizCard').classList.add('shake-card');
        setTimeout(() => $('quizCard').classList.remove('shake-card'), 380);
      }
      $('explainText').textContent = q.explanation || 'No explanation has been registered.';
      const eImg = $('explainImage');
      if (q.explanation_image) {
        eImg.src = q.explanation_image;
        eImg.style.display = 'block';
      } else {
        eImg.style.display = 'none';
      }
      $('explainBox').classList.add('show');
      $('nextBtn').querySelector('.text').textContent = (qIndex === questions.length - 1) ? 'VIEW RESULT' : 'NEXT QUESTION';
      $('nextBtn').disabled = false;
    }

    async function showResult() {
      const payload = {
        id: currentUserId,
        quiz_type: QUIZ_TYPE,
        nickname: userNickname,
        score,
        total_questions: questions.length,
        story: null,
        completed_at: new Date().toISOString()
      };
      const { error } = await db.from('quiz_users').upsert(payload);
      if (error) { alert(`Failed to save score: ${error.message}`); return; }

      const pct = (score / questions.length) * 100;
      const isPerfect = score === questions.length;
      $('resultTitle').textContent = isPerfect ? 'Congratulations!' : (pct >= 60 ? 'Congratulations!' : 'So close!');
      $('resultScore').textContent = `You answered ${score} out of ${questions.length} questions correctly.`;
      $('resultMsg').textContent = isPerfect ? 'You are truly the finest exemplar of filial devotion.' : (pct >= 60 ? 'Excellent performance.' : 'Try again for a higher score.');
      if (pct >= 60) celebrateResult();

      const { data: rankRows } = await db.from('quiz_users').select('id, nickname, score').eq('quiz_type', QUIZ_TYPE).order('score', { ascending: false });
      if (rankRows?.length) {
        const rank = rankRows.findIndex((x) => x.id === currentUserId) + 1;
        $('resultRank').textContent = `Rank ${rank} / ${rankRows.length}`;
      } else {
        $('resultRank').textContent = '';
      }

      show('resultScreen');
    }

    async function loadScoreboard() {
      $('scoreboardList').innerHTML = 'Loading...';
      const { data, error } = await db.from('quiz_users').select('nickname, score, completed_at').eq('quiz_type', QUIZ_TYPE).order('score', { ascending: false }).order('completed_at', { ascending: false });
      if (error) { $('scoreboardList').innerHTML = `Error: ${error.message}`; return; }
      if (!data || data.length === 0) { $('scoreboardList').innerHTML = 'No participants yet.'; return; }
      $('scoreboardList').innerHTML = data.map((u, i) => `<div class="item"><div>${i + 1}</div><div>${u.nickname}</div><div>${u.score}</div></div>`).join('');
    }

    function wire() {
      $('startQuizBtn').addEventListener('click', () => show('nicknameScreen'));
      $('scoreboardBtn').addEventListener('click', async () => { show('scoreboardScreen'); await loadScoreboard(); });
      $('nicknameBackBtn').addEventListener('click', () => show('mainScreen'));
      $('nicknameStartBtn').addEventListener('click', checkNicknameAndStart);
      $('nextBtn').addEventListener('click', nextStep);
      $('scoreboardBackBtn').addEventListener('click', () => show('mainScreen'));
      $('resultBoardBtn').addEventListener('click', async () => { show('scoreboardScreen'); await loadScoreboard(); });
      $('resultMainBtn').addEventListener('click', () => show('mainScreen'));
    }

    window.addEventListener('DOMContentLoaded', () => {
      wire();
      show('mainScreen');
    });
  </script>
</body>
</html>
