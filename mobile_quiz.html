<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 야연 효 퀴즈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            /* 전체 백그라운드 이미지 설정 - 원하는 이미지로 교체하세요 */
            background-image: url('your-background-image.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: #333;
            padding: 0;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 첫 번째 영역: 헤더 (30%) */
        .header {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            /* 헤더 배경 이미지 설정 - 원하는 이미지로 교체하세요 */
            background-image: url('https://cdn.imweb.me/thumbnail/20251001/5f3823eaeadf3.jpg');
            background-size: contain;
            background-position: center;
            background-blend-mode: overlay; /* 그라데이션과 이미지 블렌딩 */
            color: white;
            padding: 15px;
            text-align: center;
            height: 20vh; /* 30vh에서 20vh로 감소 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 24px; /* 폰트 크기 줄임 */
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); /* 가독성을 위한 텍스트 그림자 */
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 6px; /* 높이 줄임 */
            border-radius: 3px;
            margin: 120px 0 5px 0; /* 170px에서 120px로 조정 */
            overflow: hidden;
        }

        .progress {
            background: white;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-display {
            color: white;
            font-size: 18px; /* 14px에서 18px로 증가 */
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3); /* 가독성을 위한 텍스트 그림자 */
            transform: translateY(120px); /* 100px에서 120px로 한 줄 아래로 이동 */
        }

        /* 두 번째 영역: 문제와 이미지 (30%) */
        .question-section {
            height: 22.5vh; /* 25vh에서 22.5vh로 10% 감소 */
            background: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 0px;
            line-height: 1.4;
            color: #2c3e50;
            flex-grow: 1;
            display: flex;
            align-items: flex-start;
        }

        .question-image {
            width: 80px;
            height: 10px;
            background: transparent;
            border-radius: 10px;
            margin: 10px auto;
            display: none; /* JavaScript로 필요할 때 보이게 */
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 0px dashed #dee2e6;
        }

        .question-image img {
            width: auto; /* 비율에 맞춰 자동 */
            height: 10px; /* 높이 고정 */
            max-width: 100%; /* 컨테이너를 넘지 않게 */
            object-fit: contain; /* 비율 유지하며 전체 이미지 보이게 */
            border-radius: 8px;
        }

        .question-image.show {
            display: flex;
        }

        /* 세 번째 영역: 답안 선택 (40%) */
        .options-section {
            height: 47.5vh; /* 37.5vh에서 47.5vh로 증가하여 헤더 감소분 보완 */
            background: white;
            padding: 20px 20px 0 20px;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #e9ecef;
            position: relative;
            z-index: 10;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        /* 다음 문제 버튼을 화면 하단으로 */
        .next-btn-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 30;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .option {
            background: #f8f9fa;
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            position: relative;
            z-index: 15;
        }

        .option:hover {
            background: #e9ecef;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #5a67d8;
        }

        .option.correct {
            background: #48bb78;
            color: white;
            border-color: #38a169;
        }

        .option.incorrect {
            background: #f56565;
            color: white;
            border-color: #e53e3e;
        }

        .next-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            position: relative;
            z-index: 31;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }



        /* 퀴즈 화면 전체 */
        .quiz-content {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 결과 화면 */
        .result-screen {
            min-height: 100vh;
            background: white;
            text-align: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .result-screen.success-bg {
            background-image: url('https://cdn.imweb.me/thumbnail/20251001/33ebd3fb0c81c.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .result-content {
            position: relative;
            z-index: 2;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
            min-height: 100vh;
        }

        .result-image {
            display: none; /* 작은 이미지 프레임 숨김 */
        }

        .success-text {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }

        .result-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: white;
        }

        .result-score {
            font-size: 24px;
            margin-bottom: 30px;
            color: white;
        }

        .result-message {
            font-size: 18px;
            line-height: 1.6;
            color: white;
            max-width: 350px;
            text-align: center;
        }

        .fail {
            background: linear-gradient(45deg, #f56565, #e53e3e);
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .result-score {
            font-size: 20px;
            margin-bottom: 20px;
            color: #666;
        }

        .result-message {
            font-size: 16px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 30px;
            max-width: 300px;
        }

        .hidden {
            display: none;
        }

        /* 모바일 최적화 */
        @media (max-height: 600px) {
            .header {
                height: auto;
                min-height: 15vh; /* 작은 화면에서는 15%로 */
            }
            .question-section, .options-section {
                height: auto;
                min-height: 35vh;
            }
            
            .quiz-content {
                height: auto;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 퀴즈 화면 -->
        <div id="quizScreen" class="quiz-content">
            <!-- 첫 번째 영역: 헤더 타이틀 넣기 -->
            <div class="header">
                <h1></h1> 
                <div class="score-display">점수: <span id="currentScore">0</span> / 5</div>
                <div class="progress-bar">
                    <div class="progress" id="progressBar"></div>
                </div>
            </div>

            <!-- 두 번째 영역: 문제와 이미지 -->
            <div class="question-section">
                <div class="question-number" id="questionNumber">문제 1 / 5</div>
                <div class="question" id="questionText"></div>
                <div class="question-image" id="questionImage"></div>
            </div>

            <!-- 세 번째 영역: 답안 선택 -->
            <div class="options-section">
                <div class="options" id="optionsContainer"></div>
            </div>

            <!-- 다음 문제 버튼 - 화면 하단 고정 -->
            <div class="next-btn-container">
                <button class="next-btn" id="nextBtn" disabled>다음 문제</button>
            </div>

            <!-- 네 번째 영역: 이벤트 백그라운드 -->
            <!-- 하단 영역 제거됨 -->
        </div>

        <!-- 결과 화면 -->
        <div id="resultScreen" class="result-screen hidden">
            <div class="result-content">
                <div class="result-image" id="resultImage"></div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-score" id="resultScore"></div>
                <div class="result-message" id="resultMessage"></div>
            </div>
        </div>
    </div>

    <script>
        // 문제 은행 (10개) - 이미지 정보 추가
        const questionBank = [
            {
                question: "부모에게 효도하고 어른을 공경하는 마음을 이르는 사자성어로, 조선시대에 매우 중요하게 여겨졌던 덕목입니다. 다음 중 이 사자성어는 무엇일까요?",
                options: ["파죽지세 (破竹之勢)", "명경지수 (明鏡止水)", "망운지정 (望雲之情)", "효제충신 (孝悌忠信)"],
                correct: 3,

            },
            {
                question: "조선시대에는 부모님께 안부를 묻고, 건강을 기원하며 음식을 올리는 세시풍속이 있었습니다. 특히 한 해의 첫날 아침에 가족이 함께 모여 어른들께 큰절을 올리고 덕담을 나누던 풍습을 무엇이라 할까요?",
                options: ["단오 (端午)", "한식 (寒食)", "추석 (秋夕)", "세배 (歲拜)"],
                correct: 3,

            },
            {
                question: "조선시대 효행을 장려하기 위해 세운 비석의 이름은 무엇일까요?",
                options: ["효비", "효열비", "효자비", "효도비"],
                correct: 2,

            },
            {
                question: "효녀 심청이 아버지의 눈을 뜨게 하기 위해 인당수에 몸을 던지는 조건으로 뱃사람들에게 약속한 것은 무엇일까요?",
                options: ["공양미 삼백 그릇", "공양미 삼백 알", "공양미 삼백 석", "공양미 삼백 컵"],
                correct: 2,

            },  
            {
                question: "까마귀 반포지효에서 까마귀가 보여준 효행은 무엇일까요?",
                options: ["부모에게 먹이를 물어다 주는 것", "부모를 침입자로부터 지켜주는 것", "부모를 따뜻하게 감싸주는 것", "부모의 병을 고쳐주는 것"],
                correct: 0,

            },      
            {
                question: "다음 중 부모에 대한 효도가 매우 지극하면 불가능해 보이는 일도 이루어진다는 의미를 가진 속담은 무엇인가요?",
                options: ["고생 끝에 낙이 온다", "효성이 지극하면 돌 위에 풀이 난다", "긴 병에 효자 없다", "나갔던 며느리 효도한다"],
                correct: 1,

            },
            {
                question: "다음 한자 중, “자식이 부모를 업고 있는 모습”으로도 풀이되는 글자는 무엇일까요?",
                options: ["仁 (인, 어질 인)", "愛 (애, 사랑 애)", "忠 (충, 충성 충)", "孝 (효, 효도 효)"],
                correct: 3,

            },
            {
                question: "조선시대에는 노인 공경과 효도를 장려하기 위해 국가가 양로연(養老宴)을 열었습니다. 이에 해당하는 적절한 연령 기준은 무엇인가요?",
                options: ["60세 이상", "65세 이상", "70세 이상", "80세 이상"],
                correct: 2,

            },
            {
                question: "“밤에는 부모의 주무실 곳을 살피고, 아침에는 부모의 밤새 안부를 묻는다”는 뜻으로, 부모를 잘 섬기고 효성을 다함을 이르는 사자성어는 무엇일까요?",
                options: ["혼정신성", "견물생심", "금슬지락", "일석이조"],
                correct: 0,

            },
            {
                question: "조선시대 임금 중, 아버지 사도세자에 대한 깊은 효심으로 묘소를 자주 참배하고 현륭원(현 융륭)을 조성하여 효심을 드러냈던 인물은 누구일까요?",
                options: ["세종대왕", "영조", "정조", "성종"],
                correct: 2,

            }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswer = -1;

        // 퀴즈 시작
        function initQuiz() {
            // 10개 문제 중 5개 랜덤 선택
            currentQuestions = getRandomQuestions(questionBank, 5);
            currentQuestionIndex = 0;
            score = 0;
            selectedAnswer = -1;
            
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            
            displayQuestion();
            updateProgress();
            updateScore();
        }

        // 랜덤 문제 선택
        function getRandomQuestions(questions, count) {
            const shuffled = [...questions].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // 문제 표시
        function displayQuestion() {
            const question = currentQuestions[currentQuestionIndex];
            
            document.getElementById('questionNumber').textContent = `문제 ${currentQuestionIndex + 1} / 5`;
            document.getElementById('questionText').textContent = question.question;
            
            // 문제 이미지 표시
            const questionImage = document.getElementById('questionImage');
            if (question.image) {
                questionImage.classList.add('show');
                
                // URL인지 이모지인지 확인
                if (question.image.startsWith('http') || question.image.startsWith('data:')) {
                    // URL인 경우 img 태그로 표시
                    questionImage.innerHTML = `<img src="${question.image}" alt="문제 이미지" onerror="this.style.display='none'">`;
                } else {
                    // 이모지인 경우 텍스트로 표시
                    questionImage.innerHTML = question.image;
                }
            } else {
                questionImage.classList.remove('show');
            }
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionElement);
            });
            
            document.getElementById('nextBtn').disabled = true;
            selectedAnswer = -1;
        }

        // 선택지 클릭
        function selectOption(index) {
            selectedAnswer = index;
            
            // 모든 옵션 초기화
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.className = 'option';
            });
            
            // 선택된 옵션 하이라이트
            options[index].classList.add('selected');
            
            document.getElementById('nextBtn').disabled = false;
        }

        // 다음 문제
        function nextQuestion() {
            const question = currentQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            // 정답 표시
            options.forEach((option, index) => {
                if (index === question.correct) {
                    option.classList.add('correct');
                } else if (index === selectedAnswer && index !== question.correct) {
                    option.classList.add('incorrect');
                }
            });
            
            // 정답 체크
            if (selectedAnswer === question.correct) {
                score++;
                updateScore();
            }
            
            // 잠시 결과 보여주기
            setTimeout(() => {
                currentQuestionIndex++;
                
                if (currentQuestionIndex < 5) {
                    displayQuestion();
                    updateProgress();
                } else {
                    showResult();
                }
            }, 1500);
        }

        // 진행률 업데이트
        function updateProgress() {
            const progress = (currentQuestionIndex / 5) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // 점수 업데이트
        function updateScore() {
            document.getElementById('currentScore').textContent = score;
        }

        // 결과 표시
        function showResult() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            
            const resultScreen = document.getElementById('resultScreen');
            const resultImage = document.getElementById('resultImage');
            const resultTitle = document.getElementById('resultTitle');
            const resultScore = document.getElementById('resultScore');
            const resultMessage = document.getElementById('resultMessage');
            
            if (score >= 3) {
                // 합격 - 전체 화면에 백그라운드 이미지 적용
                resultScreen.classList.add('success-bg');
                resultImage.innerHTML = '<div class="success-text">효행어사<br>선정</div>';
                resultTitle.textContent = '축하합니다!';
                resultScore.textContent = `${score} / 5 문제 정답`;
                resultMessage.textContent = '훌륭해요! 당신은 효행어사로 선정되었습니다. 늘 부모님을 공경하고 효도하는 마음 변치 마시고 이벤트 참여 방법를 확인해주세요.';
            } else {
                // 불합격
                resultImage.className = 'result-image fail';
                resultImage.textContent = '😅';
                resultTitle.textContent = '아쉬워요!';
                resultScore.textContent = `${score} / 5 문제 정답`;
                resultMessage.textContent = '퀴즈를 못 풀었다고 불효자는 아니겠지요. 조금 아쉽지만 더 노력하면 분명 좋은 결과가 있을 거예요!';
            }
        }

        // 다음 버튼 이벤트
        document.getElementById('nextBtn').addEventListener('click', nextQuestion);

        // 퀴즈 시작
        window.onload = initQuiz;
    </script>
</body>
</html>
